name: per_docs
description: "A secure government document vault application."
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.2
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.7
  screen_protector: ^1.3.0
  camera: ^0.12.0
  share_plus: ^12.0.1
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Generators for Icon and Splash
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  change_app_package_name: ^1.4.0

flutter:
  uses-material-design: true

  # Register your assets folder so Flutter can see your icons
  assets:
    - assets/

# --- APP ICON CONFIGURATION (ADAPTIVE FIX) ---
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  
  # This section removes the white square on modern Android
  adaptive_icon_background: "#000000" 
  adaptive_icon_foreground: "assets/app_icon.png"
  
  min_sdk_android: 21 

# --- NATIVE SPLASH CONFIGURATION ---
flutter_native_splash:
  color: "#000000" # Pure black background
  image: "assets/splash_logo.png"
  android_12:
    color: "#000000"
    image: "assets/splash_logo.png"
  fullscreen: true
  

